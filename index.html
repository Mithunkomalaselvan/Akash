<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanisha // 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030005;
            --purple-core: #a855f7;
            --purple-glow: rgba(168, 85, 247, 0.4);
            --electric: #d8b4fe;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(168, 85, 247, 0.2);
        }

        /* Global Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #ffffff;
            overflow-x: hidden; /* Allow vertical scroll, hide horizontal */
            scroll-behavior: smooth;
        }

        /* --- BACKGROUND LAYER --- */
        .bg-canvas {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(126, 34, 206, 0.2) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(76, 29, 149, 0.2) 0%, transparent 40%);
            z-index: -1;
        }

        /* --- SECTION 1: HERO --- */
        .hero-section {
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .hero-card {
            position: relative;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            padding: 60px 40px;
            border-radius: 40px;
            text-align: center;
            max-width: 800px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            z-index: 10;
            animation: card-entry 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 20px;
            background: linear-gradient(to bottom, #fff, var(--electric));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: text-glow 3s ease-in-out infinite alternate;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #d1d5db;
            font-weight: 300;
            margin-bottom: 40px;
            animation: fade-in 1s ease forwards 0.8s;
            opacity: 0;
        }

        .magic-btn {
            background: var(--purple-core);
            color: white;
            padding: 20px 40px;
            border-radius: 20px;
            border: none;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 20px var(--purple-glow);
            animation: fade-in 1s ease forwards 1.2s;
            opacity: 0;
        }

        /* --- SECTION 2: INTRO --- */
        .intro-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px;
            position: relative;
        }

        .intro-container {
            max-width: 700px;
            width: 100%;
        }

        .reveal-box {
            background: rgba(168, 85, 247, 0.02);
            border-left: 2px solid var(--purple-core);
            padding: 40px;
            border-radius: 0 40px 40px 0;
            backdrop-filter: blur(10px);
        }

        .reveal-text {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 300;
            color: #efeff5;
            line-height: 1.4;
            margin-bottom: 30px;
            opacity: 0;
            transform: translateX(-20px);
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .reveal-text.active {
            opacity: 1;
            transform: translateX(0);
        }

        .divider-glow {
            width: 0;
            height: 1px;
            background: linear-gradient(90deg, var(--purple-core), transparent);
            margin: 40px 0;
            transition: width 1.5s ease;
        }

        .intro-section.active .divider-glow { width: 100%; }

        /* Shared Animations */
        @keyframes fade-in { to { opacity: 1; transform: translateY(0); } }
        @keyframes text-glow { from { filter: drop-shadow(0 0 0px #fff); } to { filter: drop-shadow(0 0 15px var(--purple-glow)); } }
        @keyframes card-entry { from { opacity: 0; transform: scale(0.9) translateY(30px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        
        /* Particle helper */
        .particle { position: absolute; background: var(--purple-core); border-radius: 50%; filter: blur(2px); opacity: 0.3; animation: float-up var(--d) linear infinite; pointer-events: none; }
        @keyframes float-up { from { transform: translateY(100vh); } to { transform: translateY(-10vh); } }
    </style>
</head>
<body>

    <div class="bg-canvas"></div>
    <div id="particles"></div>

    <section class="hero-section">
        <div class="hero-card">
            <h1>Happy Birthday, Tanisha 🎂✨</h1>
            <p class="subtitle">Today is all about you… and maybe a little bit about how lucky I am 😌</p>
            <button class="magic-btn" id="playTrigger">👉 Click here… something is waiting for you</button>
            <audio id="bgMusic" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg"></audio>
        </div>
    </section>

    <section class="intro-section" id="intro">
        <div class="intro-container">
            <div class="reveal-box">
                <p class="reveal-text delay-1">Hey you… 👀</p>
                <p class="reveal-text delay-2">I didn’t know what gift to give you this time…</p>
                <div class="divider-glow"></div>
                <p class="reveal-text delay-3">So I made something a little different.</p>
                <p class="reveal-text delay-4">A tiny corner of the internet…</p>
                <h3 class="reveal-text delay-5" style="font-weight: 800; color: var(--electric);">just to make you smile today 😊</h3>
            </div>
        </div>
    </section>

    <script>
        // Music Trigger Logic
        const btn = document.getElementById('playTrigger');
        const audio = document.getElementById('bgMusic');
        btn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                btn.innerHTML = "✨ Enjoy your day, Tanisha ✨";
            } else {
                audio.pause();
                btn.innerHTML = "👉 Click to resume music";
            }
        });

        // Intersection Observer for the Intro Section
        const introObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                    entry.target.querySelectorAll('.reveal-text').forEach((t, i) => {
                        setTimeout(() => t.classList.add('active'), i * 400);
                    });
                }
            });
        }, { threshold: 0.3 });

        introObserver.observe(document.getElementById('intro'));

        // Generate Background Particles
        const container = document.getElementById('particles');
        for (let i = 0; i < 20; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.width = p.style.height = Math.random() * 5 + 2 + 'px';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.setProperty('--d', Math.random() * 10 + 5 + 's');
            p.style.top = '100vh';
            container.appendChild(p);
        }
    </script>

</body>
</html>
