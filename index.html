<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanisha // 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --accent: #c5f82a; /* Electric Lime */
            --accent-soft: rgba(197, 248, 42, 0.2);
            --glass: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            background-color: var(--bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #ffffff;
            overflow: hidden; /* Lock scroll for full hero experience */
        }

        /* --- THE HERO CANVAS --- */
        .hero-full {
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #111 0%, #050505 100%);
        }

        /* Ambient Dynamic Glow */
        .glow-sphere {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--accent-soft) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(60px);
            z-index: 1;
            pointer-events: none;
            transition: transform 0.2s ease-out;
        }

        /* --- CONTENT LAYER --- */
        .hero-container {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 900px;
            padding: 40px;
        }

        .eyebrow {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5em;
            color: var(--accent);
            margin-bottom: 20px;
            display: block;
            font-weight: 500;
            opacity: 0.8;
        }

        h1 {
            font-size: clamp(4rem, 15vw, 11rem);
            font-weight: 800;
            line-height: 0.85;
            letter-spacing: -0.04em;
            margin-bottom: 30px;
            background: linear-gradient(180deg, #fff 30%, rgba(255,255,255,0.1) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.8));
        }

        .hero-description {
            font-size: clamp(1rem, 2vw, 1.4rem);
            color: #888;
            max-width: 550px;
            margin: 0 auto;
            line-height: 1.6;
            font-weight: 300;
        }

        /* --- DECORATIVE GLASS CARDS --- */
        .glass-float {
            position: absolute;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 20px;
            pointer-events: none;
            z-index: 5;
            animation: float 6s ease-in-out infinite alternate;
        }

        .card-left { top: 15%; left: 10%; width: 140px; height: 140px; transform: rotate(-10deg); }
        .card-right { bottom: 15%; right: 10%; width: 180px; height: 220px; transform: rotate(10deg); }

        /* --- INTERACTIVE FOOTER --- */
        .hero-footer {
            position: absolute;
            bottom: 40px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 60px;
            align-items: center;
            opacity: 0.5;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Animations */
        @keyframes float {
            from { transform: translateY(0) rotate(var(--rot)); }
            to { transform: translateY(-30px) rotate(var(--rot-end)); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate { animation: fadeIn 1.5s ease forwards; }

    </style>
</head>
<body>

    <section class="hero-full">
        <div class="glow-sphere" id="glow"></div>

        <div class="glass-float card-left" style="--rot: -10deg; --rot-end: -5deg;"></div>
        <div class="glass-float card-right" style="--rot: 10deg; --rot-end: 15deg;"></div>

        <div class="hero-container">
            <span class="eyebrow animate" style="animation-delay: 0.2s;">Birthday Edition // 2026</span>
            <h1 class="animate" style="animation-delay: 0.4s;">Tanisha.</h1>
            <p class="hero-description animate" style="animation-delay: 0.6s;">
                A digital sanctuary built to celebrate the growth, the grace, and the year ahead.
            </p>
        </div>

        <div class="hero-footer animate" style="animation-delay: 1s;">
            <div>Est. March 2026</div>
            <div>Designed for her.</div>
        </div>
    </section>

    <script>
        const glow = document.getElementById('glow');
        
        // Parallax and Glow follow
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            
            // Move glow sphere
            glow.style.left = (x - 300) + 'px';
            glow.style.top = (y - 300) + 'px';

            // Subtle tilt for glass cards
            const moveX = (x / window.innerWidth - 0.5) * 50;
            const moveY = (y / window.innerHeight - 0.5) * 50;
            
            document.querySelectorAll('.glass-float').forEach(card => {
                card.style.transform = `translate(${moveX}px, ${moveY}px) rotate(var(--rot))`;
            });
        });
    </script>
</body>
</html>
