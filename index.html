<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanisha // 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030005;
            --purple-core: #a855f7;
            --purple-glow: rgba(168, 85, 247, 0.4);
            --electric: #d8b4fe;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(168, 85, 247, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- ANIMATED GRADIENT BACKGROUND --- */
        .bg-canvas {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(126, 34, 206, 0.2) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(76, 29, 149, 0.2) 0%, transparent 40%);
            z-index: -1;
        }

        /* --- FLOATING PARTICLES (CSS ONLY) --- */
        .particle {
            position: absolute;
            background: var(--purple-core);
            border-radius: 50%;
            filter: blur(2px);
            opacity: 0.3;
            animation: float-up var(--d) linear infinite;
        }

        /* --- MAIN HERO CARD --- */
        .hero-card {
            position: relative;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            padding: 60px 40px;
            border-radius: 40px;
            text-align: center;
            max-width: 800px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            z-index: 10;
            animation: card-entry 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 20px;
            background: linear-gradient(to bottom, #fff, var(--electric));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: text-glow 3s ease-in-out infinite alternate;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #d1d5db;
            font-weight: 300;
            margin-bottom: 40px;
            opacity: 0;
            animation: fade-in 1s ease forwards 0.8s;
        }

        /* --- THE ELECTRIC BUTTON --- */
        .magic-btn {
            position: relative;
            background: var(--purple-core);
            color: white;
            padding: 20px 40px;
            border-radius: 20px;
            border: none;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 20px var(--purple-glow);
            opacity: 0;
            animation: fade-in 1s ease forwards 1.2s;
            overflow: hidden;
        }

        .magic-btn:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 0 40px var(--purple-core);
        }

        .magic-btn::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(45deg);
            transition: 0.6s;
        }

        .magic-btn:hover::after { left: 100%; }

        /* --- AUDIO VISUALIZER PILLS --- */
        .visualizer {
            display: flex;
            gap: 4px;
            justify-content: center;
            margin-top: 30px;
            height: 20px;
            opacity: 0.6;
        }

        .bar {
            width: 3px;
            height: 100%;
            background: var(--purple-core);
            border-radius: 10px;
        }

        .playing .bar { animation: bounce 0.8s ease-in-out infinite alternate; }

        /* --- ANIMATIONS --- */
        @keyframes card-entry {
            from { opacity: 0; transform: scale(0.9) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes text-glow {
            from { filter: drop-shadow(0 0 10px rgba(168, 85, 247, 0)); }
            to { filter: drop-shadow(0 0 20px var(--purple-glow)); }
        }

        @keyframes fade-in { to { opacity: 1; transform: translateY(0); } }

        @keyframes bounce {
            from { height: 20%; transform: scaleY(1); }
            to { height: 100%; transform: scaleY(1.5); background: var(--electric); }
        }

        @keyframes float-up {
            from { transform: translateY(100vh); }
            to { transform: translateY(-100px); }
        }
    </style>
</head>
<body>

    <div class="bg-canvas"></div>
    <div id="particles"></div>

    <section class="hero-card">
        <div class="visualizer" id="viz">
            <div class="bar" style="animation-delay: 0.1s"></div>
            <div class="bar" style="animation-delay: 0.3s"></div>
            <div class="bar" style="animation-delay: 0.2s"></div>
            <div class="bar" style="animation-delay: 0.4s"></div>
            <div class="bar" style="animation-delay: 0.1s"></div>
        </div>

        <h1>Happy Birthday, Tanisha 🎂✨</h1>
        
        <p class="subtitle">Today is all about you… and maybe a little bit about how lucky I am 😌</p>

        <button class="magic-btn" id="playTrigger">
            👉 Click here… something is waiting for you
        </button>

        <audio id="bgMusic" loop>
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        </audio>
    </section>

    <script>
        const btn = document.getElementById('playTrigger');
        const audio = document.getElementById('bgMusic');
        const viz = document.getElementById('viz');

        // Music & Animation Trigger
        btn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                viz.classList.add('playing');
                btn.innerHTML = "✨ Enjoy your day, Tanisha ✨";
                btn.style.background = "rgba(168, 85, 247, 0.2)";
                btn.style.border = "1px solid var(--purple-core)";
            } else {
                audio.pause();
                viz.classList.remove('playing');
                btn.innerHTML = "👉 Music paused. Click to resume?";
            }
        });

        // Generate Particles
        const container = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 5 + 2 + 'px';
            p.style.width = size;
            p.style.height = size;
            p.style.left = Math.random() * 100 + 'vw';
            p.style.setProperty('--d', Math.random() * 10 + 5 + 's');
            p.style.animationDelay = Math.random() * 5 + 's';
            container.appendChild(p);
        }

        // Parallax Effect
        document.addEventListener('mousemove', (e) => {
            const moveX = (window.innerWidth / 2 - e.pageX) / 50;
            const moveY = (window.innerHeight / 2 - e.pageY) / 50;
            document.querySelector('.hero-card').style.transform = `rotateX(${moveY}deg) rotateY(${-moveX}deg)`;
        });
    </script>


    <section class="intro-section" id="intro">
    <div class="intro-container">
        <div class="reveal-box">
            <span class="eyebrow-text">A Message for Tanisha</span>
            
            <h2 class="reveal-text">Hey you… <span class="emoji-pulse">👀</span></h2>
            
            <p class="reveal-text delay-1">
                I didn’t know what gift to give you this time…
            </p>
            
            <div class="divider-glow"></div>
            
            <p class="reveal-text delay-2">
                So I made something a little <span class="electric-span">different</span>.
            </p>
            
            <p class="reveal-text delay-3">
                A tiny corner of the internet…
            </p>

            <h3 class="reveal-text final-reveal">
                just to make you smile today 😊
            </h3>
        </div>
    </div>

    <style>
        .intro-section {
            min-height: 100vh;
            background: #030005;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px;
            position: relative;
            perspective: 1000px;
        }

        .intro-container {
            max-width: 700px;
            width: 100%;
        }

        .reveal-box {
            background: rgba(168, 85, 247, 0.02);
            border-left: 2px solid rgba(168, 85, 247, 0.3);
            padding: 40px;
            border-radius: 0 40px 40px 0;
            backdrop-filter: blur(10px);
        }

        .eyebrow-text {
            color: #a855f7;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 0.7rem;
            margin-bottom: 20px;
            display: block;
            opacity: 0.7;
        }

        .reveal-text {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 300;
            color: #efeff5;
            line-height: 1.4;
            margin-bottom: 30px;
            opacity: 0;
            transform: translateX(-20px);
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .reveal-text.active {
            opacity: 1;
            transform: translateX(0);
        }

        .electric-span {
            color: #d8b4fe;
            font-weight: 600;
            text-shadow: 0 0 15px rgba(216, 180, 254, 0.4);
        }

        .divider-glow {
            width: 0;
            height: 1px;
            background: linear-gradient(90deg, #a855f7, transparent);
            margin: 40px 0;
            transition: width 1.5s ease;
        }

        .intro-section.active .divider-glow {
            width: 100%;
        }

        .final-reveal {
            font-weight: 600;
            background: linear-gradient(to right, #fff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 50px;
        }

        .emoji-pulse {
            display: inline-block;
            animation: look-around 3s infinite;
        }

        /* Delays for staggered effect */
        .delay-1 { transition-delay: 0.4s; }
        .delay-2 { transition-delay: 0.8s; }
        .delay-3 { transition-delay: 1.2s; }
        .final-reveal { transition-delay: 1.8s; }

        @keyframes look-around {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2) rotate(10deg); }
        }

        @keyframes shadow-drift {
            from { box-shadow: -20px 0 50px rgba(168, 85, 247, 0.05); }
            to { box-shadow: -20px 0 100px rgba(168, 85, 247, 0.1); }
        }
    </style>

    <script>
        // Observer for this specific section
        const introObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                    const texts = entry.target.querySelectorAll('.reveal-text');
                    texts.forEach(t => t.classList.add('active'));
                }
            });
        }, { threshold: 0.4 });

        introObserver.observe(document.getElementById('intro'));
    </script>
</section>



    
</body>
</html>
