<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanisha // 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030005;
            --purple-core: #a855f7;
            --purple-glow: rgba(168, 85, 247, 0.4);
            --electric: #d8b4fe;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(168, 85, 247, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #ffffff;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- BACKGROUND LAYER --- */
        .bg-canvas {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, #1a0b2e 0%, #030005 100%);
            z-index: -1;
        }

        .particle {
            position: absolute;
            background: var(--purple-core);
            border-radius: 50%;
            filter: blur(2px);
            opacity: 0.3;
            animation: float-up var(--d) linear infinite;
            pointer-events: none;
        }

        /* --- INTRO SECTION (NOW THE LANDING) --- */
        .intro-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 40px 20px;
            perspective: 1500px; /* For 3D Tilt */
        }

        .cursor-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            transition: transform 0.1s ease-out;
        }

        .intro-container {
            z-index: 2;
            width: 100%;
            max-width: 800px;
        }

        .reveal-box {
            background: rgba(255, 255, 255, 0.015);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 60px 50px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            transform-style: preserve-3d;
            transition: transform 0.2s ease-out;
        }

        .eyebrow-text {
            color: var(--purple-core);
            font-size: 0.75rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 30px;
            display: block;
            opacity: 0.8;
        }

        .reveal-text {
            font-size: clamp(1.4rem, 4vw, 2.2rem);
            color: #efeff5;
            margin-bottom: 25px;
            font-weight: 300;
            opacity: 0;
            filter: blur(12px);
            transform: translateY(20px) translateZ(0);
            transition: all 1s cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* Class added by JS on load */
        .reveal-text.visible {
            opacity: 1;
            filter: blur(0);
            transform: translateY(0) translateZ(40px);
        }

        .highlight-purple {
            color: var(--electric);
            font-weight: 600;
            text-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
        }

        .divider-glow {
            width: 0;
            height: 1px;
            background: linear-gradient(90deg, var(--purple-core), transparent);
            margin: 40px 0;
            transition: width 2s ease 0.5s;
        }

        .divider-glow.active { width: 100%; }

        @keyframes float-up {
            from { transform: translateY(110vh); }
            to { transform: translateY(-10vh); }
        }

        .eye-move {
            display: inline-block;
            animation: eye-float 3s infinite;
        }

        @keyframes eye-float {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1) rotate(5deg); }
        }
    </style>
</head>
<body>

    <div class="bg-canvas"></div>
    <div id="particles"></div>

    <section class="intro-section" id="intro">
        <div class="cursor-glow" id="introGlow"></div>

        <div class="intro-container">
            <div class="reveal-box" id="tiltCard">
                <span class="eyebrow-text">Birthday Entry // 2026</span>
                
                <p class="reveal-text">Hey you… <span class="eye-move">👀</span></p>
                <p class="reveal-text">I didn’t know what gift to give you this time…</p>
                
                <div class="divider-glow" id="divider"></div>
                
                <p class="reveal-text">So I made something a little <span class="highlight-purple">different</span>.</p>
                <p class="reveal-text">A tiny corner of the internet…</p>

                <h3 class="reveal-text" style="font-weight: 700; color: #fff;">
                    just to make you smile today 😊
                </h3>
            </div>
        </div>
    </section>

    <script>
        const tiltCard = document.getElementById('tiltCard');
        const introGlow = document.getElementById('introGlow');
        const introSection = document.getElementById('intro');

        // 1. Reveal Animation on Page Load
        window.addEventListener('DOMContentLoaded', () => {
            const texts = document.querySelectorAll('.reveal-text');
            const divider = document.getElementById('divider');
            
            texts.forEach((t, i) => {
                setTimeout(() => {
                    t.classList.add('visible');
                    if(i === 1) divider.classList.add('active'); // Start line after 2nd text
                }, i * 700);
            });
        });

        // 2. 3D Mouse Tilt & Glow Follow
        introSection.addEventListener('mousemove', (e) => {
            const rect = introSection.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            // Move the soft glow
            introGlow.style.transform = `translate(${x - 300}px, ${y - 300}px)`;

            // Calculate tilt degrees
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            const rotateX = (y - centerY) / 25;
            const rotateY = (centerX - x) / 25;

            tiltCard.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        // Reset tilt on mouse leave
        introSection.addEventListener('mouseleave', () => {
            tiltCard.style.transform = `rotateX(0deg) rotateY(0deg)`;
        });

        // 3. Background Particles
        const container = document.getElementById('particles');
        for (let i = 0; i < 25; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 4 + 2 + 'px';
            p.style.width = p.style.height = size;
            p.style.left = Math.random() * 100 + 'vw';
            p.style.setProperty('--d', Math.random() * 15 + 10 + 's');
            p.style.animationDelay = Math.random() * 5 + 's';
            container.appendChild(p);
        }
    </script>
</body>
</html>
